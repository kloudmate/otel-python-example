version: '3.8'

services:
  # Jaeger all-in-one for collecting and viewing traces
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP HTTP receiver
    networks:
      - otel-network

  # Python Flask application with OpenTelemetry
  app:
    build: .
    container_name: otel-python-app
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_SERVICE_NAME=otel-python-example
      - OTEL_EXPORTER_OTLP_HEADERS=Authorization=Bearer demo-token-12345
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=docker,service.version=1.0.0
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
    ports:
      - "5000:5000"
    depends_on:
      - jaeger
    networks:
      - otel-network

networks:
  otel-network:
    driver: bridge
